name: Collect Application Version
description: 'Collect application version and break it down into parts'
inputs:
  app_name:
    description: 'Application repository name'
    required: true
  branch:
    description: 'Branch name'
    required: true
  token:
    description: 'GitHub token with organization read permissions'
    required: false

outputs:
  version:
    description: 'Application version'
    value: ${{ steps.collect-version.outputs.version }}
  major:
    description: 'Major version'
    value: ${{ steps.collect-version.outputs.major }}
  minor:
    description: 'Minor version'
    value: ${{ steps.collect-version.outputs.minor }}
  patch:
    description: 'Patch version'
    value: ${{ steps.collect-version.outputs.patch }}
  is_snapshot:
    description: 'Is snapshot version'
    value: ${{ steps.collect-version.outputs.is_snapshot }}
  build_number:
    description: 'Build number'
    value: ${{ steps.collect-version.outputs.build_number }}
  is_infrastructure_error:
    description: 'Reserved for backwards compatibility; always emits `false` (no mvn invocation after RANCHER-2977)'
    value: ${{ steps.collect-version.outputs.is_infrastructure_error }}
  error_category:
    description: 'NONE | POM_NOT_FOUND | INVALID_VERSION_FORMAT'
    value: ${{ steps.collect-version.outputs.error_category }}
  failure_reason:
    description: 'Standard failure message if the read failed'
    value: ${{ steps.collect-version.outputs.failure_reason }}

runs:
  using: 'composite'
  steps:
    - name: Collect Application Version
      id: collect-version
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token || github.token }}
        APP_NAME: ${{ inputs.app_name }}
        BRANCH: ${{ inputs.branch }}
      run: |
        set -eo pipefail

        fail_app() {
          local category="$1"
          local msg="$2"
          echo "::error::$msg"
          {
            echo "is_infrastructure_error=false"
            echo "error_category=$category"
            echo "failure_reason=$msg"
          } >> "$GITHUB_OUTPUT"
          exit 1
        }

        if ! pom_b64=$(gh api "repos/${APP_NAME}/contents/pom.xml?ref=${BRANCH}" --jq '.content' 2>/dev/null); then
          fail_app "POM_NOT_FOUND" "Failed to fetch pom.xml from ${APP_NAME}@${BRANCH}"
        fi

        current_version=$(printf '%s' "$pom_b64" | base64 -d | awk '
          /<parent>/    { in_parent=1 }
          /<\/parent>/  { in_parent=0; next }
          in_parent     { next }
          /<version>/ {
            if (match($0, /<version>[^<]+<\/version>/)) {
              print substr($0, RSTART+9, RLENGTH-19)
              exit
            }
          }
        ')

        if [ -z "$current_version" ]; then
          fail_app "INVALID_VERSION_FORMAT" "Could not extract project <version> from pom.xml"
        fi

        echo "::notice::Current version from pom.xml: $current_version"

        if [[ ! $current_version =~ ^[0-9]+\.[0-9]+\.[0-9]+(-SNAPSHOT(\.[0-9]+)?)?$ ]]; then
          fail_app "INVALID_VERSION_FORMAT" "Unable to parse version from pom.xml: $current_version"
        fi

        IFS='.- ' read -r major minor patch snapshot build <<<"${current_version//-SNAPSHOT/- SNAPSHOT}"

        echo "::notice::Major version: $major"
        echo "::notice::Minor version: $minor"
        echo "::notice::Patch version: $patch"
        echo "::notice::Snapshot version: $snapshot"
        echo "::notice::Build number: $build"

        {
          echo "version=$current_version"
          echo "major=$major"
          echo "minor=$minor"
          echo "patch=$patch"
          echo "is_snapshot=$([ "$snapshot" = "SNAPSHOT" ] && echo true || echo false)"
          echo "build_number=$build"
          echo "is_infrastructure_error=false"
          echo "error_category=NONE"
        } >> "$GITHUB_OUTPUT"
