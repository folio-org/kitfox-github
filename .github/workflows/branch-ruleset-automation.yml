name: Branch Ruleset Automation

run-name: >-
  Branch ruleset update • ${{ inputs.repo_owner }}/${{ inputs.repo_name }}

on:
  workflow_dispatch:
    inputs:
      repo_owner:
        description: 'Repository owner'
        required: true
        type: string
      repo_name:
        description: 'Repository name'
        required: true
        type: string
      head_sha:
        description: 'Commit SHA that triggered the update'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Branch Configurations
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_branches: ${{ steps.build-matrix.outputs.has_branches }}
      skipped_branches: ${{ steps.build-matrix.outputs.skipped_branches }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.EUREKA_CI_APP_ID }}
          private-key: ${{ secrets.EUREKA_CI_APP_KEY }}
          owner: ${{ inputs.repo_owner }}
          repositories: ${{ inputs.repo_name }}

      - name: Get Update Configuration
        id: get-config
        uses: folio-org/kitfox-github/.github/actions/get-update-config@master
        with:
          repo: ${{ inputs.repo_owner }}/${{ inputs.repo_name }}
          github_token: ${{ steps.app-token.outputs.token }}

      - name: Build Matrix
        id: build-matrix
        env:
          BRANCH_CONFIG: ${{ steps.get-config.outputs.branch_config }}
        run: |
          set -eo pipefail

          MATRIX_ENTRIES="[]"
          SKIPPED_BRANCHES="[]"

          for branch_entry in $(echo "$BRANCH_CONFIG" | jq -c '.[]'); do
            branch=$(echo "$branch_entry" | jq -r '.branch')
            ruleset=$(echo "$branch_entry" | jq -c '.ruleset // {}')

            ruleset_enabled=$(echo "$ruleset" | jq -r '.enabled // true')

            if [[ "$ruleset_enabled" != "true" ]]; then
              echo "::notice::Skipping branch $branch (ruleset.enabled=false)"
              SKIPPED_BRANCHES=$(echo "$SKIPPED_BRANCHES" | jq -c --arg b "$branch (ruleset disabled)" '. += [$b]')
              continue
            fi

            entry=$(jq -n \
              --arg branch "$branch" \
              --argjson ruleset "$ruleset" \
              '{branch: $branch, ruleset: $ruleset}')

            MATRIX_ENTRIES=$(echo "$MATRIX_ENTRIES" | jq -c --argjson entry "$entry" '. += [$entry]')
            echo "::notice::Prepared matrix entry for branch: $branch"
          done

          BRANCH_COUNT=$(echo "$MATRIX_ENTRIES" | jq 'length')
          echo "::notice::Matrix contains $BRANCH_COUNT branches"

          if [[ "$BRANCH_COUNT" -gt 0 ]]; then
            echo "matrix={\"include\": $(echo "$MATRIX_ENTRIES" | jq -c .)}" >> "$GITHUB_OUTPUT"
            echo "has_branches=true" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"include\": []}" >> "$GITHUB_OUTPUT"
            echo "has_branches=false" >> "$GITHUB_OUTPUT"
          fi

          echo "skipped_branches=$(echo "$SKIPPED_BRANCHES" | jq -c .)" >> "$GITHUB_OUTPUT"

  update-rulesets:
    name: Update Ruleset - ${{ matrix.branch }}
    needs: prepare
    if: needs.prepare.outputs.has_branches == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
      max-parallel: 5
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.EUREKA_CI_APP_ID }}
          private-key: ${{ secrets.EUREKA_CI_APP_KEY }}
          owner: ${{ inputs.repo_owner }}
          repositories: ${{ inputs.repo_name }}

      - name: Update Branch Ruleset
        id: update-ruleset
        uses: folio-org/kitfox-github/.github/actions/branch-ruleset-management@master
        with:
          repository: ${{ inputs.repo_owner }}/${{ inputs.repo_name }}
          branch: ${{ matrix.branch }}
          ruleset_pattern: ${{ matrix.ruleset.pattern }}
          required_checks: ${{ toJson(matrix.ruleset.required_checks) }}
          merge_queue: ${{ toJson(matrix.ruleset.merge_queue) }}
          bypass_actors: ${{ toJson(matrix.ruleset.bypass_actors) }}
          integration_id: ${{ vars.EUREKA_CI_APP_ID }}
          github_token: ${{ steps.app-token.outputs.token }}

      - name: Report Result
        run: |
          echo "### Ruleset Update Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ matrix.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Result:** ${{ steps.update-ruleset.outputs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Message:** ${{ steps.update-ruleset.outputs.message }}" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.update-ruleset.outputs.ruleset_id }}" ]]; then
            echo "**Ruleset ID:** ${{ steps.update-ruleset.outputs.ruleset_id }}" >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    name: Send Notifications
    needs: [prepare, update-rulesets]
    if: always() && !cancelled() && needs.prepare.outputs.has_branches == 'true'
    runs-on: ubuntu-latest
    outputs:
      team_channel: ${{ steps.get-vars.outputs.team_channel }}
    env:
      WORKFLOW_SUCCESS: ${{ needs.update-rulesets.result == 'success' }}
      TITLE_TEXT: "${{ inputs.repo_name }} branch ruleset update ${{ needs.update-rulesets.result == 'success' && 'completed' || 'failed' }}"
      TITLE_BLOCK: |
        {
          "type": "section",
          "text": {
            "type": "mrkdwn",
            "text": "*${{ inputs.repo_name }} branch ruleset update ${{ needs.update-rulesets.result == 'success' && 'completed' || 'failed' }} <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>*"
          }
        }
      ATTACHMENT: |
        {
          "color": "${{ needs.update-rulesets.result == 'success' && 'good' || 'danger' }}",
          "fields": [
            {
              "title": "Status",
              "value": "${{ needs.update-rulesets.result }}",
              "short": true
            }${{ inputs.head_sha != '' && format(',
            {{
              "title": "Config Change",
              "value": "<https://github.com/{0}/{1}/commit/{2}|{2}>",
              "short": true
            }}', inputs.repo_owner, inputs.repo_name, inputs.head_sha) || '' }}
          ],
          "footer": "Eureka CI/CD"
        }
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.EUREKA_CI_APP_ID }}
          private-key: ${{ secrets.EUREKA_CI_APP_KEY }}
          owner: ${{ inputs.repo_owner }}
          repositories: ${{ inputs.repo_name }}

      - name: Get Repository Variables
        id: get-vars
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              const { data: variable } = await github.rest.actions.getRepoVariable({
                owner: '${{ inputs.repo_owner }}',
                repo: '${{ inputs.repo_name }}',
                name: 'SLACK_NOTIF_CHANNEL'
              });
              console.log(`Found SLACK_NOTIF_CHANNEL: ${variable.value}`);
              core.setOutput('team_channel', variable.value);
            } catch (error) {
              console.log(`SLACK_NOTIF_CHANNEL not found or not accessible: ${error.message}`);
              core.setOutput('team_channel', '');
            }

      - name: Send to Team Channel
        if: steps.get-vars.outputs.team_channel != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.EUREKA_CI_SLACK_BOT_TOKEN }}
          errors: false
          payload: |
            {
              "channel": "${{ steps.get-vars.outputs.team_channel }}",
              "text": "${{ env.TITLE_TEXT }}",
              "blocks": [
                ${{ env.TITLE_BLOCK }}
              ],
              "attachments": [
                ${{ env.ATTACHMENT }}
              ]
            }

      - name: Send to General Channel
        if: vars.GENERAL_SLACK_NOTIF_CHANNEL != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.EUREKA_CI_SLACK_BOT_TOKEN }}
          errors: false
          payload: |
            {
              "channel": "${{ vars.GENERAL_SLACK_NOTIF_CHANNEL }}",
              "text": "${{ env.TITLE_TEXT }}",
              "blocks": [
                ${{ env.TITLE_BLOCK }}
              ],
              "attachments": [
                ${{ env.ATTACHMENT }}
              ]
            }

  summarize:
    name: Workflow Summary
    needs: [prepare, update-rulesets, notify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Workflow Summary
        env:
          MATRIX_RESULT: ${{ needs.update-rulesets.result }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          HAS_BRANCHES: ${{ needs.prepare.outputs.has_branches }}
          SKIPPED_BRANCHES: ${{ needs.prepare.outputs.skipped_branches }}
        run: |
          {
            echo "### Branch Ruleset Automation Summary"
            echo ""
            echo "**Repository:** \`${{ inputs.repo_owner }}/${{ inputs.repo_name }}\`"
            if [[ -n "${{ inputs.head_sha }}" ]]; then
              echo "**Trigger Commit:** [\`${{ inputs.head_sha }}\`](https://github.com/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/commit/${{ inputs.head_sha }})"
            fi
            echo ""

            echo "### Ruleset Configuration"
            echo ""
            echo "Rulesets are configured based on \`.github/update-config.yml\` in the target repository."
            echo "Each branch with \`ruleset.enabled: true\` receives:"
            echo "- Required status checks (configurable)"
            echo "- Merge queue settings (optional, configurable)"
            echo "- Bypass actors for automation"
            echo ""

            echo "### Results"
            echo ""

            if [[ "$PREPARE_RESULT" == "success" ]]; then
              if [[ "$HAS_BRANCHES" == "true" ]]; then
                if [[ "$MATRIX_RESULT" == "success" ]]; then
                  echo "**Status:** All branch rulesets updated successfully"
                elif [[ "$MATRIX_RESULT" == "failure" ]]; then
                  echo "**Status:** Some branch rulesets failed to update"
                else
                  echo "**Status:** $MATRIX_RESULT"
                fi
              else
                echo "**Status:** No branches required ruleset updates"
              fi
            else
              echo "**Status:** Preparation failed - $PREPARE_RESULT"
            fi

            if [[ -n "$SKIPPED_BRANCHES" && "$SKIPPED_BRANCHES" != "[]" ]]; then
              echo ""
              echo "**Skipped Branches:** $(echo "$SKIPPED_BRANCHES" | jq -r 'join(", ")')"
            fi

            echo ""
            echo "### Notification Status"
            echo ""
            if [[ -n "${{ needs.notify.outputs.team_channel }}" ]]; then
              echo "**Team Channel** (\`${{ needs.notify.outputs.team_channel }}\`): Sent"
            else
              echo "**Team Channel:** Not configured"
            fi

            if [[ -n "${{ vars.GENERAL_SLACK_NOTIF_CHANNEL }}" ]]; then
              echo "**General Channel** (\`${{ vars.GENERAL_SLACK_NOTIF_CHANNEL }}\`): Sent"
            else
              echo "**General Channel:** Not configured"
            fi

            echo ""
            echo "---"
            echo ""
            echo "**Workflow Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> $GITHUB_STEP_SUMMARY
