name: Branch Ruleset Update (Flow)

run-name: ${{ inputs.repo_name }} ruleset update on ${{ inputs.branch }}

on:
  workflow_call:
    inputs:
      repo_owner:
        description: 'Repository owner'
        required: true
        type: string
      repo_name:
        description: 'Repository name'
        required: true
        type: string
      branch:
        description: 'Branch to configure ruleset for'
        required: true
        type: string
      head_sha:
        description: 'Commit SHA that triggered the update'
        required: false
        type: string
        default: ''
      ruleset_pattern:
        description: 'Ruleset naming pattern ({0} = branch name)'
        required: false
        type: string
        default: '{0}-eureka-ci'
      required_checks:
        description: 'JSON array of required status checks'
        required: false
        type: string
        default: '[]'
      merge_queue:
        description: 'JSON object with merge queue configuration'
        required: false
        type: string
        default: '{}'
      bypass_actors:
        description: 'JSON array of bypass actors'
        required: false
        type: string
        default: '[]'
      enforcement:
        description: 'Ruleset enforcement level: active or disabled'
        required: false
        type: string
        default: 'active'
    outputs:
      outcome:
        description: 'Operation outcome of the ruleset update'
        value: ${{ jobs.update-ruleset.outputs.outcome }}
      ruleset_id:
        description: 'Ruleset ID'
        value: ${{ jobs.update-ruleset.outputs.ruleset_id }}
      message:
        description: 'Status message'
        value: ${{ jobs.update-ruleset.outputs.message }}

permissions:
  contents: read

concurrency:
  group: ruleset-update-${{ inputs.repo_owner }}/${{ inputs.repo_name }}-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  update-ruleset:
    name: Update Ruleset
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.update-ruleset.outputs.outcome }}
      ruleset_id: ${{ steps.update-ruleset.outputs.ruleset_id }}
      message: ${{ steps.update-ruleset.outputs.message }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.EUREKA_CI_APP_ID }}
          private-key: ${{ secrets.EUREKA_CI_APP_KEY }}
          owner: ${{ inputs.repo_owner }}
          repositories: ${{ inputs.repo_name }}

      - name: Update Branch Ruleset
        id: update-ruleset
        uses: folio-org/kitfox-github/.github/actions/branch-ruleset-management@master
        with:
          repository: ${{ inputs.repo_owner }}/${{ inputs.repo_name }}
          branch: ${{ inputs.branch }}
          ruleset_pattern: ${{ inputs.ruleset_pattern }}
          required_checks: ${{ inputs.required_checks }}
          merge_queue: ${{ inputs.merge_queue }}
          bypass_actors: ${{ inputs.bypass_actors }}
          enforcement: ${{ inputs.enforcement }}
          integration_id: ${{ vars.EUREKA_CI_APP_ID }}
          github_token: ${{ steps.app-token.outputs.token }}

  notify:
    name: Send Notifications
    needs: [update-ruleset]
    if: always() && !cancelled() && needs.update-ruleset.outputs.outcome != 'skipped'
    runs-on: ubuntu-latest
    outputs:
      team_notif_status: ${{ steps.notify-team.outcome }}
      general_notif_status: ${{ steps.notify-general.outcome }}
    env:
      TITLE_TEXT: "${{ inputs.repo_name }} `${{ inputs.branch }}` ruleset ${{ needs.update-ruleset.result == 'success' && 'updated' || 'failed' }}"
      TITLE_BLOCK: |
        {
          "type": "section",
          "text": {
            "type": "mrkdwn",
            "text": "*${{ inputs.repo_name }} `${{ inputs.branch }}` ruleset ${{ needs.update-ruleset.result == 'success' && 'updated' || 'failed' }}* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>"
          }
        }
      SUCCESS_ATTACHMENT: |
        {
          "color": "good",
          "fields": [
            {
              "title": "Ruleset ID",
              "value": "<https://github.com/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/settings/rules/${{ needs.update-ruleset.outputs.ruleset_id }}|${{ needs.update-ruleset.outputs.ruleset_id }}>",
              "short": true
            }${{ inputs.head_sha != '' && format(',
            {{
              "title": "Config Change",
              "value": "<https://github.com/{0}/{1}/commit/{2}|{2}>",
              "short": true
            }}', inputs.repo_owner, inputs.repo_name, inputs.head_sha) || '' }}
          ],
          "footer": "Eureka CI/CD"
        }
      FAILURE_ATTACHMENT: |
        {
          "color": "danger",
          "fields": [
            {
              "title": "Failure Reason",
              "value": "${{ needs.update-ruleset.outputs.message || 'Check workflow logs for details' }}",
              "short": false
            }
          ],
          "footer": "Eureka CI/CD"
        }
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.EUREKA_CI_APP_ID }}
          private-key: ${{ secrets.EUREKA_CI_APP_KEY }}
          owner: ${{ inputs.repo_owner }}
          repositories: ${{ inputs.repo_name }}

      - name: Get Repository Variables
        id: get-vars
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              const { data: variable } = await github.rest.actions.getRepoVariable({
                owner: '${{ inputs.repo_owner }}',
                repo: '${{ inputs.repo_name }}',
                name: 'SLACK_NOTIF_CHANNEL'
              });
              console.log(`Found SLACK_NOTIF_CHANNEL: ${variable.value}`);
              core.setOutput('team_channel', variable.value);
            } catch (error) {
              console.log(`SLACK_NOTIF_CHANNEL not found or not accessible: ${error.message}`);
              core.setOutput('team_channel', '');
            }

      - name: Notify Team Channel
        id: notify-team
        if: steps.get-vars.outputs.team_channel != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.EUREKA_CI_SLACK_BOT_TOKEN }}
          errors: false
          payload: |
            {
              "channel": "${{ steps.get-vars.outputs.team_channel }}",
              "text": "${{ env.TITLE_TEXT }}",
              "blocks": [
                ${{ env.TITLE_BLOCK }}
              ],
              "attachments": [
                ${{ needs.update-ruleset.result != 'success' && env.FAILURE_ATTACHMENT || env.SUCCESS_ATTACHMENT }}
              ]
            }

      - name: Notify General Channel
        id: notify-general
        if: vars.GENERAL_SLACK_NOTIF_CHANNEL != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.EUREKA_CI_SLACK_BOT_TOKEN }}
          errors: false
          payload: |
            {
              "channel": "${{ vars.GENERAL_SLACK_NOTIF_CHANNEL }}",
              "text": "${{ env.TITLE_TEXT }}",
              "blocks": [
                ${{ env.TITLE_BLOCK }}
              ],
              "attachments": [
                ${{ needs.update-ruleset.result != 'success' && env.FAILURE_ATTACHMENT || env.SUCCESS_ATTACHMENT }}
              ]
            }

  summarize:
    name: Workflow Summary
    needs: [update-ruleset, notify]
    if: always()
    runs-on: ubuntu-latest
    env:
      UPDATE_RESULT: ${{ needs.update-ruleset.result }}
      RULESET_OUTCOME: ${{ needs.update-ruleset.outputs.outcome }}
      RULESET_ID: ${{ needs.update-ruleset.outputs.ruleset_id }}
      MESSAGE: ${{ needs.update-ruleset.outputs.message }}
      TEAM_NOTIF_STATUS: ${{ needs.notify.outputs.team_notif_status || 'skipped' }}
      GENERAL_NOTIF_STATUS: ${{ needs.notify.outputs.general_notif_status || 'skipped' }}
    steps:
      - name: Generate Summary
        run: |
          {
            echo "## Branch Ruleset Update"
            echo ""
            echo "**Repository:** \`${{ inputs.repo_owner }}/${{ inputs.repo_name }}\`"
            echo "**Branch:** \`${{ inputs.branch }}\`"
            echo ""

            if [[ "$UPDATE_RESULT" == "success" ]]; then
              echo "### ✅ $MESSAGE"
            else
              echo "### ❌ $MESSAGE"
            fi

            if [[ -n "$RULESET_ID" ]]; then
              echo "**Ruleset ID:** $RULESET_ID"
            fi

            echo ""
            echo "### 📨 Notification Status"
            echo ""
            echo "- **Team Channel:** $TEAM_NOTIF_STATUS"
            echo "- **General Channel:** $GENERAL_NOTIF_STATUS"
          } >> $GITHUB_STEP_SUMMARY
